name: CI

# Offline checks on every push + PR: lint and the test suite, which fakes the
# heavy model and Qdrant so it runs in seconds with no GPU and no keys.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + offline tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dev tooling
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Offline tests
        run: pytest
